[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/snapshots/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin-samples/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/server.py"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin-config.local.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin-config.sample.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
